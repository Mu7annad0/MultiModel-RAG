services:
  pgvector:
    image: pgvector/pgvector:pg18-trixie
    container_name: mmrag_pgvector
    ports:
      - "5432:5432"
    volumes:
      - pgvector_db:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=password
    networks:
      - backend
    restart: always

networks:
  backend:

volumes:
  pgvector_db:
